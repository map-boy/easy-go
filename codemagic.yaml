workflows:
  easy-go-android:
    name: Easy GO Android APK
    max_build_duration: 60
    environment:
      node: 22.11.0
      java: 21
      vars:
        PACKAGE_NAME: "com.easygo.rwanda"
        APP_NAME: "Easy GO"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Vite app
        script: npm run build

      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        script: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "$APP_NAME" "$PACKAGE_NAME" --web-dir dist
          else
            echo "Capacitor already initialised"
          fi

      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android already exists"
          fi
          npx cap sync android

      - name: Configure Android manifest
        script: |
          if ! grep -q "INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i 's|</manifest>|<uses-permission android:name="android.permission.INTERNET"/>\n</manifest>|' android/app/src/main/AndroidManifest.xml
          fi

      - name: Fix Java 21 compatibility
        script: |
          printf '\nsubprojects { afterEvaluate { project -> if (project.hasProperty("android")) { project.android.compileOptions { sourceCompatibility JavaVersion.VERSION_21; targetCompatibility JavaVersion.VERSION_21 } } } }\n' >> android/build.gradle
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - umwemubi@gmail.com
        notify:
          success: true
          failure: true