workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - google_play_credentials # Define these in Codemagic UI if needed
      vars:
        PACKAGE_NAME: "com.wandaatech.easygo"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Lint and Test
        script: |
          npm test
      - name: Build Android
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - umwemubi@gmail.com