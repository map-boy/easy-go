workflows:
  easy-go-android:
    name: Easy GO Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      vars:
        PACKAGE_NAME: "com.easygo.rwanda"
        APP_NAME: "Easy GO"

    scripts:
      # ── 1. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        script: npm install

      # ── 2. Build the web app ───────────────────────────────────────────────
      - name: Build Vite app
        script: npm run build

      # ── 3. Install Capacitor ───────────────────────────────────────────────
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 4. Init Capacitor (skip if already initialised) ───────────────────
      - name: Init Capacitor
        script: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "$APP_NAME" "$PACKAGE_NAME" --web-dir dist
          else
            echo "Capacitor already initialised — skipping"
          fi

      # ── 5. Add Android platform ────────────────────────────────────────────
      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists — syncing"
          fi
          npx cap sync android

      # ── 6. Set app name and version in Android manifest ───────────────────
      - name: Configure Android manifest
        script: |
          # Set internet permission (required for Supabase + maps)
          if ! grep -q "INTERNET" android/app/src/main/AndroidManifest.xml; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n</manifest>|' android/app/src/main/AndroidManifest.xml
          fi
          # Allow cleartext (needed for some map tiles)
          sed -i 's/android:label="@string\/app_name"/android:label="@string\/app_name" android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml || true

      # ── 7. Build debug APK ─────────────────────────────────────────────────
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - umwemubi@gmail.com
        notify:
          success: true
          failure: true