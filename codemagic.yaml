workflows:
  react-native-android:
    name: Easy Go Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      vars:
        CI: 1 # This replaces the --non-interactive flag
    scripts:
      - name: Install dependencies
        script: |
          npm install
          # Explicitly install expo if it's missing from node_modules
          npm install expo
      - name: Prebuild Android
        script: |
          # Use npx to ensure we use the local project's expo version
          npx expo prebuild --platform android
      - name: Build Android Release
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - umwemubi@gmail.com