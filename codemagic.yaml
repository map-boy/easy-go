workflows:
  react-native-android:
    name: Easy Go Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20 # Using a stable long-term support version
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android
        script: |
          # This command creates the 'android' folder that was missing
          npx expo prebuild --platform android --non-interactive
      - name: Build Android Release
        script: |
          # Now that the folder exists, we can enter it and build
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - umwemubi@gmail.com